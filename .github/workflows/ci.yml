# CI workflow for ag_foundation
# Runs on every push and PR to main

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check (lint)
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Run tests with warnings as errors
        run: pytest -W error --cov=src/ag --cov-report=term-missing --cov-fail-under=70
        env:
          AG_DEV: "1"

  # Coverage threshold job (authoritative)
  coverage:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Coverage check
        run: pytest --cov=src/ag --cov-report=term-missing --cov-fail-under=70
        env:
          AG_DEV: "1"
